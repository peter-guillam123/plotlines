<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novelmaps — Victorian novels, mapped</title>
  <meta name="description" content="Watch the characters of Victorian novels move across a genuine Victorian map, chapter by chapter.">
  <link rel="stylesheet" href="vendor/maplibre-gl/maplibre-gl.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map" aria-label="Map of character journeys"></div>

  <header id="masthead" class="panel"></header>
  <nav id="legend" class="panel" aria-label="Characters — select one to follow them"></nav>
  <div id="places" class="panel"></div>
  <div id="captions" aria-live="polite"></div>
  <div id="controls" class="panel"></div>
  <div id="sheet"></div>

  <noscript><p class="noscript">Novelmaps needs JavaScript to draw the map.</p></noscript>
  <script src="vendor/maplibre-gl/maplibre-gl.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
