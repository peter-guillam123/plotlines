<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlotLines - the classics, mapped</title>
  <meta name="description" content="Follow the characters of classic novels and plays across a genuine period map - the whole story played out, all at once.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PlotLines">
  <meta property="og:title" content="PlotLines - the classics, mapped">
  <meta property="og:description" content="Every journey in the book, played out on a genuine period map - out-of-copyright novels and plays, followed stop by stop from Frankenstein to Shakespeare.">
  <meta property="og:image" content="https://peter-guillam123.github.io/plotlines/assets/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="PlotLines - the classics, mapped">
  <meta property="og:url" content="https://peter-guillam123.github.io/plotlines/">
  <meta name="twitter:card" content="summary_large_image">
  <script>
    // Mark real touch devices early (before paint) so the mobile layout and
    // the rotate hint apply only there, never to a small desktop window.
    if (matchMedia('(any-pointer: coarse)').matches
        || navigator.maxTouchPoints > 0
        || 'ontouchstart' in window) {
      document.documentElement.classList.add('touch');
    }
  </script>
  <link rel="stylesheet" href="vendor/maplibre-gl/maplibre-gl.css">
  <link rel="stylesheet" href="css/style.css?v=20260717a">
</head>
<body>
  <div id="map" aria-label="Map of character journeys"></div>

  <div id="rail">
    <header id="masthead" class="panel"></header>
    <nav id="legend" class="panel" aria-label="Characters - select one to follow them"></nav>
    <div id="places" class="panel"></div>
  </div>
  <div id="locationtile" aria-live="polite"></div>
  <div id="storycard" aria-live="polite" hidden></div>
  <div id="captions" aria-live="polite"></div>
  <div id="controls" class="panel"></div>
  <button type="button" id="recentre" aria-label="Frame the story" title="Frame the story" hidden>
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <circle cx="12" cy="12" r="3.2" fill="currentColor"/>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <button type="button" id="mobile-stop" aria-label="End the journey and go back">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div id="sheet"></div>
  <div id="intro"></div>
  <div id="overture"></div>
  <div id="library"></div>

  <div id="rotate-hint" role="dialog" aria-label="Turn your phone sideways">
    <div class="rotate-inner">
      <div class="rotate-glyph" aria-hidden="true">
        <svg viewBox="0 0 120 120">
          <path class="rotate-arrow" d="M28 44a40 40 0 0 1 64-6" fill="none" stroke="currentColor"
                stroke-width="3" stroke-linecap="round"/>
          <path d="M90 24l4 15-15-2" fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round"/>
          <g class="rotate-phone">
            <rect x="46" y="34" width="28" height="52" rx="5" fill="none" stroke="currentColor" stroke-width="3"/>
            <rect x="50" y="40" width="20" height="40" rx="1.5" fill="var(--paper-bright)"/>
            <path d="M53 72q6-13 11-8t9-14" fill="none" stroke="var(--rule)" stroke-width="2"/>
            <circle cx="64" cy="52" r="3" fill="var(--accent)"/>
            <line x1="57" y1="83" x2="63" y2="83" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <p class="rotate-title">PlotLines opens best sideways</p>
      <p class="rotate-sub">Turn your phone to unfold the map.</p>
      <button type="button" class="rotate-dismiss">Read upright anyway</button>
    </div>
  </div>

  <noscript><p class="noscript">PlotLines needs JavaScript to draw the map.</p></noscript>
  <script>
    // Let a reader who can't rotate (orientation lock, AT) dismiss the hint.
    document.querySelector('.rotate-dismiss')?.addEventListener('click', () => {
      document.getElementById('rotate-hint').classList.add('dismissed');
    });
  </script>
  <script src="vendor/maplibre-gl/maplibre-gl.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
